<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Table</title>
<style>

/* ── FONTS ── */
@font-face {
  font-family: 'Geist';
  src: url('Fonts/geist-latin.woff2') format('woff2');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Geist Mono';
  src: url('Fonts/geist-mono-latin.woff2') format('woff2');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #19181500;
  --bg:      #181612;
  --surface: #211f1a;
  --border:  #302d26;
  --cream:   #ece8df;
  --text:    #a8a399;
  --muted:   #948e82;
  --faint:   #3a372f;
  --accent:  #c98a5e;
  --green:   #8a9a6b;
  --sans:    'Geist', sans-serif;
  --mono:    'Geist Mono', monospace;
  --popup-shadow: 0 8px 40px rgba(0,0,0,0.6);
}

html.light {
  --bg:      #f4f1ea;
  --surface: #eae5da;
  --border:  #dad4c6;
  --cream:   #211d16;
  --text:    #4a463d;
  --muted:   #655f52;
  --faint:   #b3ab99;
  --accent:  #9a5530;
  --green:   #5e6e3f;
  --popup-shadow: 0 8px 40px rgba(0,0,0,0.12);
}

html { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 400;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.page { max-width: 680px; margin: 0 auto; padding: 64px 32px 120px; }

/* ── HEADER ── */
header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 56px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.wordmark {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--cream);
  font-weight: 400;
}

.header-right { display: flex; align-items: center; gap: 16px; }

.date-display {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--muted);
}

.mode-toggle {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--faint);
  background: none; border: none; cursor: pointer; padding: 0;
  transition: color 0.15s;
}
.mode-toggle:hover { color: var(--muted); }

/* ── ENTRY HEADER ── */
.entry { animation: fadeIn 0.35s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.entry-header { margin-bottom: 36px; }

.entry-eyebrow {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}

.entry-titel {
  font-size: clamp(24px, 4.5vw, 34px);
  font-weight: 500;
  line-height: 1.2;
  color: var(--cream);
  letter-spacing: -0.02em;
  margin-bottom: 14px;
}

.entry-intro {
  font-size: 15px;
  color: var(--muted);
  line-height: 1.7;
  font-style: italic;
  margin-bottom: 18px;
}

.season-tags { display: flex; gap: 6px; flex-wrap: wrap; }

.season-tag {
  font-family: var(--mono);
  font-size: 0.53rem;
  letter-spacing: 0.08em;
  text-transform: lowercase;
  color: var(--green);
  border: 1px solid var(--border);
  padding: 3px 8px;
}

/* ── SECTION DIVIDERS ── */
.section-divider { width: 100%; height: 1px; background: var(--border); margin: 48px 0 36px; }

.section-label {
  font-family: var(--mono);
  font-size: 0.53rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 28px;
}

/* ── DAY CARDS ── */
.days { display: flex; flex-direction: column; gap: 22px; }

.day {
  border-left: 2px solid var(--border);
  padding-left: 20px;
}

.day-name {
  font-family: var(--mono);
  font-size: 0.56rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}

.day-dish {
  font-size: 18px;
  font-weight: 500;
  color: var(--cream);
  line-height: 1.3;
  letter-spacing: -0.01em;
  margin-bottom: 10px;
}

.day-note { font-size: 13px; line-height: 1.55; color: var(--accent); font-style: italic; margin-bottom: 12px; }

.day-core { font-size: 14.5px; line-height: 1.7; color: var(--text); margin-bottom: 14px; }

.day-meta { display: flex; flex-direction: column; gap: 6px; }

.meta-row { display: flex; gap: 8px; font-size: 13px; line-height: 1.5; }

.meta-key {
  font-family: var(--mono);
  font-size: 0.52rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  flex: 0 0 64px;
  padding-top: 3px;
}

.meta-val { color: var(--text); flex: 1; }
.meta-val.toddler { color: var(--muted); font-style: italic; }

/* ── IDEA LISTS ── */
.ideas { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
@media (max-width: 520px) { .ideas { grid-template-columns: 1fr; } }

.idea-group-label {
  font-family: var(--mono);
  font-size: 0.53rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}

.idea-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.idea-list li { font-size: 14px; line-height: 1.55; color: var(--text); }

/* ── SHOPPING ── */
.shop-hint { font-size: 13px; color: var(--muted); margin-bottom: 24px; font-style: italic; }

.shop-section { margin-bottom: 28px; }

.shop-section-head {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}

.shop-section-title {
  font-family: var(--mono);
  font-size: 0.56rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--cream);
}

.organic-badge {
  font-family: var(--mono);
  font-size: 0.5rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--green);
  border: 1px solid var(--green);
  padding: 2px 6px;
  opacity: 0.85;
}

.shop-list { list-style: none; display: flex; flex-direction: column; }

.shop-item {
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  min-height: 44px;
  padding: 12px 0 12px 30px;
  position: relative;
  cursor: pointer;
  border-bottom: 1px solid transparent;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.15s;
}

.shop-item::before {
  content: "";
  position: absolute;
  left: 0; top: 14px;
  width: 16px; height: 16px;
  border: 1.5px solid var(--muted);
  border-radius: 3px;
  transition: background 0.15s, border-color 0.15s;
}

.shop-item:hover::before { border-color: var(--accent); }
.shop-item:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 3px; }

.shop-item.checked { color: var(--faint); text-decoration: line-through; }
.shop-item.checked::before {
  background: var(--accent);
  border-color: var(--accent);
}

/* ── PANTRY ── */
.pantry-list { list-style: none; display: flex; flex-wrap: wrap; gap: 8px 10px; }
.pantry-list li {
  font-size: 13px;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 5px 11px;
  border-radius: 3px;
}

/* ── EATEN / LOGGED DAYS ── */
.day.eaten { opacity: 0.62; }
.eaten-tag, .big-tag {
  font-family: var(--mono);
  font-size: 0.5rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 1px 6px;
  margin-left: 10px;
  vertical-align: 1px;
}
.eaten-tag { color: var(--green); border: 1px solid var(--green); }
.big-tag { color: var(--muted); border: 1px solid var(--border); }

/* ── VESPER ── */
.vesper-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
.vesper-day { border-left: 2px solid var(--border); padding-left: 18px; }
.vesper-day-name {
  font-family: var(--mono);
  font-size: 0.56rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
}
.vesper-idea { font-size: 14px; line-height: 1.6; color: var(--text); }

/* ── ON HAND ── */
.onhand-group { margin-bottom: 20px; }
.onhand-group .idea-group-label { margin-bottom: 12px; }

/* ── PREP TIP ── */
.preptip {
  background: var(--surface);
  border-left: 2px solid var(--accent);
  padding: 20px 24px;
  font-size: 14.5px;
  line-height: 1.7;
  color: var(--text);
}

/* ── ARCHIVE ── */
.archive-item {
  display: block;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  transition: opacity 0.15s;
}
.archive-item:first-child { border-top: 1px solid var(--border); }
.archive-item:hover { opacity: 0.65; }
.archive-item.current { opacity: 0.3; pointer-events: none; }

.archive-date {
  font-family: var(--mono);
  font-size: 0.53rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}
.archive-titel { font-size: 15px; font-weight: 500; color: var(--cream); margin-bottom: 3px; }
.archive-intro { font-size: 13px; color: var(--muted); font-style: italic; line-height: 1.5; }

.empty { font-size: 15px; color: var(--muted); padding: 48px 0; }

@media (max-width: 560px) {
  .page { padding: 40px 20px 80px; }
}

/* ── PANTRY MATCH ── */
.pantry-btn {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--faint);
  background: none; border: none; cursor: pointer; padding: 0;
  transition: color 0.15s;
}
.pantry-btn:hover { color: var(--muted); }

.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  -webkit-backdrop-filter: blur(3px);
  backdrop-filter: blur(3px);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 48px 20px;
  overflow-y: auto;
  z-index: 50;
  opacity: 0; visibility: hidden;
  transition: opacity 0.2s, visibility 0.2s;
}
.overlay.open { opacity: 1; visibility: visible; }

.overlay-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: var(--popup-shadow);
  max-width: 540px; width: 100%;
  padding: 32px 30px 28px;
  animation: fadeIn 0.3s ease;
}

.overlay-eyebrow {
  font-family: var(--mono);
  font-size: 0.53rem; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 12px;
}
.overlay-title {
  font-size: 22px; font-weight: 500; color: var(--cream);
  letter-spacing: -0.02em; margin-bottom: 10px;
}
.overlay-sub {
  font-size: 13.5px; color: var(--muted); font-style: italic;
  line-height: 1.6; margin-bottom: 20px;
}

.pantry-input {
  width: 100%;
  min-height: 96px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px; line-height: 1.6;
  padding: 12px 14px;
  resize: vertical;
  outline: none;
  transition: border-color 0.15s;
}
.pantry-input:focus { border-color: var(--accent); }
.pantry-input::placeholder { color: var(--faint); }

.pantry-helper {
  font-family: var(--mono);
  font-size: 0.55rem; letter-spacing: 0.06em;
  margin: 10px 0 0;
  display: flex; gap: 16px;
}
.pantry-helper button {
  background: none; border: none; padding: 0; cursor: pointer;
  font: inherit; color: var(--green); letter-spacing: inherit;
  text-transform: uppercase; transition: opacity 0.15s;
}
.pantry-helper button:hover { opacity: 0.65; }

.overlay-actions { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
.btn {
  font-family: var(--mono);
  font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 11px 18px; cursor: pointer;
  border: 1px solid var(--border); background: none; color: var(--muted);
  transition: color 0.15s, border-color 0.15s, opacity 0.15s;
}
.btn:hover { color: var(--cream); border-color: var(--muted); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { color: #fff; border-color: var(--accent); opacity: 0.88; }

.cover-full { color: var(--green); }
.cover-part { color: var(--accent); }

.cover-badge {
  font-family: var(--mono); font-size: 0.5rem; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 1px 6px; margin-left: 10px;
  border: 1px solid currentColor; vertical-align: 1px;
}
.need-line { font-size: 12.5px; color: var(--muted); margin-bottom: 12px; }
.need-line b { color: var(--accent); font-weight: 400; }

.pantry-active-note {
  font-size: 12.5px; color: var(--green); font-style: italic;
  margin-bottom: 24px; display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
}
.pantry-active-note button {
  font-family: var(--mono); font-size: 0.52rem; letter-spacing: 0.08em;
  text-transform: uppercase; background: none; border: 1px solid var(--border);
  color: var(--muted); padding: 4px 9px; cursor: pointer; transition: color 0.15s;
  font-style: normal;
}
.pantry-active-note button:hover { color: var(--cream); }

</style>
</head>
<body>
<div class="page">
  <header>
    <span class="wordmark">Family Table</span>
    <div class="header-right">
      <button class="pantry-btn" id="pantryBtn" onclick="openPantry()">pantry</button>
      <button class="mode-toggle" id="modeToggle" onclick="toggleMode()">light</button>
      <span class="date-display" id="dateDisplay"></span>
    </div>
  </header>
  <main id="main"></main>
</div>

<div class="overlay" id="pantryOverlay" role="dialog" aria-modal="true" aria-labelledby="pantryTitle">
  <div class="overlay-panel">
    <div class="overlay-eyebrow">Pantry match</div>
    <h2 class="overlay-title" id="pantryTitle">What's in your kitchen?</h2>
    <p class="overlay-sub">List what you already have — produce, leftovers, anything. The week gets re-ranked so you cook the best-covered nights first and shop less. Everyday staples (oil, flour, spices, onion, garlic) are assumed.</p>
    <textarea class="pantry-input" id="pantryInput" placeholder="carrots, potatoes, rice, tofu, baby tomatoes, coconut milk…"></textarea>
    <div class="pantry-helper">
      <button type="button" onclick="seedFromKitchen()">+ fill from “in the kitchen”</button>
      <button type="button" onclick="clearPantry()">clear</button>
    </div>
    <div class="overlay-actions">
      <button class="btn btn-primary" onclick="runMatch()">Reorder my week</button>
      <button class="btn" id="pantryResetBtn" onclick="resetOrder()">Reset to date order</button>
      <button class="btn" onclick="closePantry()">Cancel</button>
    </div>
  </div>
</div>

<script>

let weeks = [];
let currentWeek = null;
let pantryActive = localStorage.getItem('ft-pantry-active') === '1';

/* ── Light/dark mode ── */
function toggleMode() {
  var isLight = document.documentElement.classList.toggle('light');
  document.getElementById('modeToggle').textContent = isLight ? 'dark' : 'light';
  localStorage.setItem('ft-mode', isLight ? 'light' : 'dark');
}
(function initMode() {
  if (localStorage.getItem('ft-mode') === 'light') {
    document.documentElement.classList.add('light');
    document.getElementById('modeToggle').textContent = 'dark';
  }
})();

/* ── Dates ── */
function todayStr() { return new Date().toISOString().slice(0, 10); }

function formatRange(str) {
  var months = ["January","February","March","April","May","June",
                "July","August","September","October","November","December"];
  var d = new Date(str + "T12:00:00");
  return d.getDate() + " " + months[d.getMonth()] + " " + d.getFullYear();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Render a week ── */
function renderWeek(w) {
  if (!w) return '<p class="empty">No meal plan available yet.</p>';
  var html = '<div class="entry">';

  html += '<div class="entry-header">';
  html += '<div class="entry-eyebrow">Weekly meal plan</div>';
  html += '<h1 class="entry-titel">' + esc(w.title) + '</h1>';
  if (w.intro) html += '<p class="entry-intro">' + esc(w.intro) + '</p>';
  if (w.season && w.season.length) {
    html += '<div class="season-tags">';
    w.season.forEach(function(s){ html += '<span class="season-tag">' + esc(s) + '</span>'; });
    html += '</div>';
  }
  html += '</div>';

  /* Dinners */
  if (w.days && w.days.length) {
    html += '<div class="section-divider"></div><p class="section-label">Dinners</p>';
    if (pantryActive) {
      html += '<div class="pantry-active-note">Ranked by what you already have — cook from the top to shop less.' +
              '<button onclick="resetOrder()">reset to date order</button></div>';
    }
    var haveText = haveTextFor(w);
    var rows = w.days.map(function(d, i){ return { d: d, i: i, s: scoreDay(d, haveText) }; });
    if (pantryActive) rows.sort(pantrySort);
    html += '<div class="days">';
    rows.forEach(function(o){
      var d = o.d, s = o.s, full = s.total && s.have.length === s.total;
      html += '<div class="day' + (d.eaten ? ' eaten' : '') + '">';
      html += '<div class="day-name">' + esc(d.day) + (d.eaten ? '<span class="eaten-tag">eaten</span>' : '');
      if (pantryActive && s.total) {
        html += '<span class="cover-badge ' + (full ? 'cover-full' : 'cover-part') + '">' + s.have.length + '/' + s.total + ' have</span>';
      }
      html += '</div>';
      html += '<div class="day-dish">' + esc(d.dish) + '</div>';
      if (d.note) html += '<div class="day-note">' + esc(d.note) + '</div>';
      if (pantryActive && s.need.length) {
        html += '<div class="need-line">Still need: <b>' + s.need.map(esc).join(', ') + '</b></div>';
      }
      if (d.core) html += '<div class="day-core">' + esc(d.core) + '</div>';
      html += '<div class="day-meta">';
      if (d.kids)    html += '<div class="meta-row"><span class="meta-key">Kids</span><span class="meta-val">' + esc(d.kids) + '</span></div>';
      if (d.dairy)   html += '<div class="meta-row"><span class="meta-key">You</span><span class="meta-val">' + esc(d.dairy) + '</span></div>';
      if (d.toddler) html += '<div class="meta-row"><span class="meta-key">Toddler</span><span class="meta-val toddler">' + esc(d.toddler) + '</span></div>';
      html += '</div></div>';
    });
    html += '</div>';
  }

  /* Breakfast & lunch ideas */
  if ((w.breakfasts && w.breakfasts.length) || (w.lunches && w.lunches.length)) {
    html += '<div class="section-divider"></div><p class="section-label">Breakfast &amp; lunch ideas</p>';
    html += '<div class="ideas">';
    if (w.breakfasts && w.breakfasts.length) {
      html += '<div><div class="idea-group-label">Breakfast</div><ul class="idea-list">';
      w.breakfasts.forEach(function(b){ html += '<li>' + esc(b) + '</li>'; });
      html += '</ul></div>';
    }
    if (w.lunches && w.lunches.length) {
      html += '<div><div class="idea-group-label">Lunch</div><ul class="idea-list">';
      w.lunches.forEach(function(l){ html += '<li>' + esc(l) + '</li>'; });
      html += '</ul></div>';
    }
    html += '</div>';
  }

  /* Vesper (older child's snack box) */
  if (w.vesper) {
    html += '<div class="section-divider"></div><p class="section-label">Vesper · older one</p>';
    if (w.vesper.note) html += '<p class="shop-hint">' + esc(w.vesper.note) + '</p>';
    if (w.vesper.days && w.vesper.days.length) {
      html += '<div class="vesper-list">';
      w.vesper.days.forEach(function(v){
        html += '<div class="vesper-day">';
        html += '<div class="vesper-day-name">' + esc(v.day) + (v.big ? '<span class="big-tag">bigger</span>' : '') + '</div>';
        html += '<div class="vesper-idea">' + esc(v.idea) + '</div>';
        html += '</div>';
      });
      html += '</div>';
    }
    if (w.vesper.more_ideas && w.vesper.more_ideas.length) {
      html += '<div class="idea-group-label">More to rotate in (no sweets)</div>';
      html += '<ul class="pantry-list">';
      w.vesper.more_ideas.forEach(function(m){ html += '<li>' + esc(m) + '</li>'; });
      html += '</ul>';
    }
  }

  /* Already in the kitchen */
  if (w.onhand && w.onhand.length) {
    html += '<div class="section-divider"></div><p class="section-label">Already in the kitchen</p>';
    w.onhand.forEach(function(g){
      html += '<div class="onhand-group"><div class="idea-group-label">' + esc(g.group) + '</div>';
      html += '<ul class="pantry-list">';
      g.items.forEach(function(it){ html += '<li>' + esc(it) + '</li>'; });
      html += '</ul></div>';
    });
  }

  /* Shopping list */
  if (w.shopping && w.shopping.length) {
    html += '<div class="section-divider"></div><p class="section-label">' + esc(w.shoptitle || 'Shopping list') + '</p>';
    html += '<p class="shop-hint">' + esc(w.shopnote || 'Grouped by aisle. Tap an item to check it off — it stays ticked on this device.') + '</p>';
    w.shopping.forEach(function(sec, si){
      html += '<div class="shop-section"><div class="shop-section-head">';
      html += '<span class="shop-section-title">' + esc(sec.section) + '</span>';
      if (sec.organic) html += '<span class="organic-badge">organic</span>';
      html += '</div><ul class="shop-list">';
      sec.items.forEach(function(item, ii){
        var key = w.id + '|' + si + '|' + ii;
        var checked = localStorage.getItem('ft-shop-' + key) === '1';
        html += '<li class="shop-item' + (checked ? ' checked' : '') + '" data-key="' + key +
                '" role="checkbox" tabindex="0" aria-checked="' + (checked ? 'true' : 'false') + '">' + esc(item) + '</li>';
      });
      html += '</ul></div>';
    });
  }

  /* Pantry */
  if (w.pantry && w.pantry.length) {
    html += '<div class="section-divider"></div><p class="section-label">Likely already in your pantry</p>';
    html += '<ul class="pantry-list">';
    w.pantry.forEach(function(p){ html += '<li>' + esc(p) + '</li>'; });
    html += '</ul>';
  }

  /* Prep tip */
  if (w.preptip) {
    html += '<div class="section-divider"></div><p class="section-label">Weekend prep tip</p>';
    html += '<div class="preptip">' + esc(w.preptip) + '</div>';
  }

  html += '</div>';
  return html;
}

/* ── Archive ── */
function renderArchive(currentId) {
  if (weeks.length <= 1) return '';
  var html = '<div class="section-divider"></div><p class="section-label">Past weeks</p>';
  weeks.forEach(function(w){
    var cur = w.id === currentId;
    html += '<a class="archive-item' + (cur ? ' current' : '') + '" href="#' + w.id + '">';
    html += '<div class="archive-date">' + formatRange(w.date) + '</div>';
    html += '<div class="archive-titel">' + esc(w.title) + '</div>';
    if (w.intro) html += '<div class="archive-intro">' + esc(w.intro) + '</div>';
    html += '</a>';
  });
  return html;
}

/* ── Shopping check toggle (mouse + keyboard) ── */
function toggleShopItem(item){
  var key = item.dataset.key;
  var on = item.classList.toggle('checked');
  item.setAttribute('aria-checked', on ? 'true' : 'false');
  if (on) localStorage.setItem('ft-shop-' + key, '1');
  else localStorage.removeItem('ft-shop-' + key);
}
document.addEventListener('click', function(e){
  var item = e.target.closest('.shop-item');
  if (item) toggleShopItem(item);
});
document.addEventListener('keydown', function(e){
  if (e.key !== 'Enter' && e.key !== ' ') return;
  var item = e.target.closest && e.target.closest('.shop-item');
  if (!item) return;
  e.preventDefault();
  toggleShopItem(item);
});

/* ── Navigation ── */
function findWeek(id) { return weeks.find(function(w){ return w.id === id; }) || null; }
function getMostRecent() {
  var t = todayStr();
  return weeks.find(function(w){ return w.date <= t; }) || weeks[0] || null;
}
function navigateTo(w) {
  if (!w) return;
  currentWeek = w;
  document.getElementById('main').innerHTML = renderWeek(w) + renderArchive(w.id);
  window.scrollTo(0, 0);
  document.getElementById('dateDisplay').textContent = formatRange(w.date);
}
function handleHash() {
  var hash = location.hash.slice(1);
  if (hash) { var w = findWeek(hash); if (w) { navigateTo(w); return; } }
  navigateTo(getMostRecent());
}
window.addEventListener('hashchange', handleHash);

/* ── Pantry match ── */
/* Longer / multi-word terms first so containment dedupe keeps the specific one. */
var INGREDIENT_VOCAB = [
  "spring onion","baby tomato","cherry tomato","green bean","white bean","kidney bean",
  "bell pepper","oyster mushroom","coconut milk","soy milk","soy sauce","vegetable broth",
  "olive oil","cream cheese","peanut butter","nut butter",
  "onion","garlic","ginger","carrot","potato","aubergine","eggplant","tomato","mushroom",
  "champignon","shimeji","zucchini","courgette","pumpkin","cucumber","pepper","broccoli",
  "cauliflower","fennel","bean","pea","spinach","chard","lentil","chickpea","tofu","radish",
  "millet","rice","pasta","spaghetti","noodle","flour","bread","pretzel","roll","milk","butter",
  "margarine","cream","quark","yoghurt","yogurt","cheese","parmesan","paneer","mozzarella","egg",
  "wurst","sausage","fish","salmon","tuna","miso","cashew","almond","avocado","coriander",
  "basil","parsley","dill","paprika","cumin","turmeric","nutmeg","lemon","lime","hummus",
  "corn","leek","cabbage","beetroot","apple","banana","berry","strawberry"
];

/* Staples assumed always on hand, so they never show up as "still need". */
var ASSUMED_STAPLES = "salt oil olive oil flour sugar garlic onion ginger water " +
  "cumin coriander turmeric paprika nutmeg pepper spice spices soy sauce vegetable broth maggi";

function escRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function termRe(t){ return new RegExp('\\b' + escRe(t) + '(s|es)?\\b', 'i'); }

/* Vocab terms present in a text, deduped so "onion" drops when "spring onion" is there. */
function detectTerms(text){
  var lc = ' ' + String(text).toLowerCase() + ' ';
  var found = INGREDIENT_VOCAB.filter(function(t){ return termRe(t).test(lc); });
  return found.filter(function(t){
    return !found.some(function(u){
      return u !== t && u.length > t.length && new RegExp('\\b' + escRe(t) + '\\b').test(u);
    });
  });
}

function dayText(d){ return [d.dish, d.core, d.kids, d.dairy].filter(Boolean).join('  '); }

function haveTextFor(w){
  var base = localStorage.getItem('ft-pantry-have') || '';
  return ' ' + (base + '  ' + ASSUMED_STAPLES).toLowerCase() + ' ';
}

function scoreDay(d, haveText){
  var detected = detectTerms(dayText(d));
  var have = [], need = [];
  detected.forEach(function(t){ (termRe(t).test(haveText) ? have : need).push(t); });
  return { detected: detected, have: have, need: need, total: detected.length,
           coverage: detected.length ? have.length / detected.length : 0 };
}

function pantrySort(a, b){
  var ae = a.d.eaten ? 1 : 0, be = b.d.eaten ? 1 : 0;
  if (ae !== be) return ae - be;                                   /* eaten nights sink */
  if (b.s.coverage !== a.s.coverage) return b.s.coverage - a.s.coverage;
  if (a.s.need.length !== b.s.need.length) return a.s.need.length - b.s.need.length;
  return a.i - b.i;
}

function openPantry(){
  var inp = document.getElementById('pantryInput');
  inp.value = localStorage.getItem('ft-pantry-have') || '';
  if (!inp.value.trim() && currentWeek) seedFromKitchen();
  document.getElementById('pantryResetBtn').style.display = pantryActive ? '' : 'none';
  document.getElementById('pantryOverlay').classList.add('open');
  inp.focus();
}
function closePantry(){ document.getElementById('pantryOverlay').classList.remove('open'); }

function seedFromKitchen(){
  if (!currentWeek || !currentWeek.onhand) return;
  var items = [];
  currentWeek.onhand.forEach(function(g){ g.items.forEach(function(i){ items.push(i); }); });
  document.getElementById('pantryInput').value = items.join(', ');
}
function clearPantry(){ document.getElementById('pantryInput').value = ''; document.getElementById('pantryInput').focus(); }

/* One action: save the list, rank + reorder the week, close the overlay. */
function runMatch(){
  var val = document.getElementById('pantryInput').value.trim();
  localStorage.setItem('ft-pantry-have', val);
  pantryActive = true;
  localStorage.setItem('ft-pantry-active', '1');
  closePantry();
  if (currentWeek) navigateTo(currentWeek);
}

function resetOrder(){
  pantryActive = false;
  localStorage.removeItem('ft-pantry-active');
  closePantry();
  if (currentWeek) navigateTo(currentWeek);
}

document.getElementById('pantryOverlay').addEventListener('click', function(e){
  if (e.target === this) closePantry();
});
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') closePantry();
});

/* ── Init ── */
function sortWeeks(a){ return a.slice().sort(function(x,y){ return y.date.localeCompare(x.date); }); }

fetch('./recipes-content.json')
  .then(function(r){ return r.json(); })
  .then(function(data){ weeks = sortWeeks(data); handleHash(); })
  .catch(function(){ document.getElementById('main').innerHTML = '<p class="empty">Could not load the meal plans.</p>'; });

document.getElementById('dateDisplay').textContent = formatRange(todayStr());

</script>
